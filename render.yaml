services:
  - type: web
    name: car-company-empire-online
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: car-company-empire-db
          property: connectionString

databases:
  - name: car-company-empire-db
    plan: free
    databaseName: car_company_empire
    user: car_company_empire
