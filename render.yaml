services:
  - type: web
    name: car-company-empire-online
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: car-company-empire-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PUBLIC_SERVER_URL
        value: https://car-company-empire-online.onrender.com
      - key: PUBLIC_GAME_URL
        value: https://car-company-empire.onrender.com

databases:
  - name: car-company-empire-db
    plan: free
    databaseName: car_company_empire
    user: car_company_empire
